name: Mise à jour quotidienne des offres

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch offers
        env:
          LBA_API_TOKEN: ${{ secrets.LBA_API_TOKEN }}
          DEBUG_LBA: "1"
        run: python scripts/fetch_offres.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/offres.json
          git diff --quiet --cached || git commit -m "Mise à jour automatique des offres"
          git push
